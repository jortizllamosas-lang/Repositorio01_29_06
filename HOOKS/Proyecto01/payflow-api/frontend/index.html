<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayFlow Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #238636;
      --accent-hover: #2ea043;
      --danger: #da3633;
      --warn: #d29922;
      --info: #1f6feb;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --radius: 8px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    header .logo { font-size: 1.6rem; }
    header .badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #health-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    #health-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    #health-dot.ok { background: #3fb950; }
    #health-dot.error { background: var(--danger); }

    main {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h2 .icon { font-size: 1.1rem; }

    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
    label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
    input, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--info); }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s, opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
    .btn-complete { background: var(--info); color: #fff; }
    .btn-fail    { background: var(--danger); color: #fff; }
    .btn-refund  { background: var(--warn); color: #fff; }

    .api-key-box {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      margin-top: 12px;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
    }
    .api-key-box strong { color: var(--text-muted); display: block; margin-bottom: 4px; font-family: var(--font); }
    #api-key-value { color: #58a6ff; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag-pending   { background: rgba(210,153,34,.15); color: var(--warn); }
    .tag-completed { background: rgba(63,185,80,.15);  color: #3fb950; }
    .tag-failed    { background: rgba(218,54,51,.15);  color: var(--danger); }
    .tag-refunded  { background: rgba(139,148,158,.15);color: var(--text-muted); }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left;
      padding: 8px 12px;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .empty { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 24px 0; }

    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      margin-top: 10px;
      display: none;
    }
    .alert-error { background: rgba(218,54,51,.15); border: 1px solid var(--danger); color: #ff7b72; }
    .alert-success { background: rgba(63,185,80,.15); border: 1px solid #3fb950; color: #3fb950; }
  </style>
</head>
<body>

<header>
  <span class="logo">💳</span>
  <h1>PayFlow Dashboard</h1>
  <span class="badge">Demo</span>
  <div id="health-badge">
    <div id="health-dot"></div>
    <span id="health-text">Comprobando...</span>
  </div>
</header>

<main>

  <!-- CREAR MERCHANT -->
  <div class="card">
    <h2><span class="icon">🏪</span> Crear Merchant</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="m-name">Nombre</label>
        <input id="m-name" type="text" placeholder="Mi Tienda Online" />
      </div>
      <div class="form-group">
        <label for="m-email">Email</label>
        <input id="m-email" type="email" placeholder="tienda@ejemplo.com" />
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <label>&nbsp;</label>
        <button class="btn-primary" onclick="createMerchant()">Crear Merchant</button>
      </div>
    </div>
    <div id="merchant-alert" class="alert"></div>
    <div class="api-key-box" id="api-key-box">
      <strong>API Key generada — guárdala, se usará para los pagos</strong>
      <span id="api-key-value"></span>
    </div>
  </div>

  <!-- CREAR PAGO -->
  <div class="card">
    <h2><span class="icon">💸</span> Crear Pago</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="p-amount">Importe (€)</label>
        <input id="p-amount" type="number" step="0.01" min="0.01" placeholder="49.99" />
      </div>
      <div class="form-group" style="max-width:110px;">
        <label for="p-currency">Moneda</label>
        <select id="p-currency">
          <option>EUR</option><option>USD</option><option>GBP</option>
        </select>
      </div>
      <div class="form-group">
        <label for="p-desc">Descripción</label>
        <input id="p-desc" type="text" placeholder="Suscripción Pro" />
      </div>
      <div class="form-group">
        <label for="p-email">Email cliente</label>
        <input id="p-email" type="email" placeholder="cliente@ejemplo.com" />
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <label>&nbsp;</label>
        <button class="btn-primary" onclick="createPayment()">Pagar</button>
      </div>
    </div>
    <div id="payment-alert" class="alert"></div>
  </div>

  <!-- LISTADO DE PAGOS -->
  <div class="card">
    <h2><span class="icon">📋</span> Pagos del Merchant</h2>
    <div style="margin-bottom:12px;">
      <button class="btn-primary" onclick="loadPayments()">Actualizar</button>
    </div>
    <div id="payments-container">
      <p class="empty">Crea un merchant y un pago para verlos aquí.</p>
    </div>
  </div>

</main>

<script>
  const API = 'http://localhost:8000';
  let currentApiKey = null;

  // ── Health Check ────────────────────────────────────────────────────────────
  async function checkHealth() {
    const dot  = document.getElementById('health-dot');
    const text = document.getElementById('health-text');
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      if (d.status === 'ok') {
        dot.className = 'ok'; text.textContent = `API v${d.version} · Online`;
      } else {
        dot.className = 'error'; text.textContent = 'API degradada';
      }
    } catch {
      dot.className = 'error'; text.textContent = 'API no disponible';
    }
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function showAlert(id, msg, type = 'error') {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert alert-${type}`;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }

  function statusTag(s) {
    return `<span class="tag tag-${s}">${s}</span>`;
  }

  function actionButtons(p) {
    const btns = [];
    if (p.status === 'pending') {
      btns.push(`<button class="btn-sm btn-complete" onclick="changeStatus('${p.id}','completed')">Completar</button>`);
      btns.push(`<button class="btn-sm btn-fail"     onclick="changeStatus('${p.id}','failed')">Fallar</button>`);
    }
    if (p.status === 'completed') {
      btns.push(`<button class="btn-sm btn-refund"   onclick="changeStatus('${p.id}','refunded')">Devolver</button>`);
    }
    return btns.join('');
  }

  // ── Create Merchant ─────────────────────────────────────────────────────────
  async function createMerchant() {
    const name  = document.getElementById('m-name').value.trim();
    const email = document.getElementById('m-email').value.trim();
    if (!name || !email) { showAlert('merchant-alert', 'Nombre y email son obligatorios.'); return; }

    try {
      const r = await fetch(`${API}/merchants`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email }),
      });
      const d = await r.json();
      if (!r.ok) { showAlert('merchant-alert', d.detail || 'Error al crear merchant.'); return; }

      currentApiKey = d.api_key;
      document.getElementById('api-key-value').textContent = d.api_key;
      document.getElementById('api-key-box').style.display = 'block';
      showAlert('merchant-alert', `Merchant "${d.name}" creado correctamente.`, 'success');
      document.getElementById('m-name').value = '';
      document.getElementById('m-email').value = '';
    } catch (e) {
      showAlert('merchant-alert', 'No se pudo conectar con la API.');
    }
  }

  // ── Create Payment ──────────────────────────────────────────────────────────
  async function createPayment() {
    if (!currentApiKey) { showAlert('payment-alert', 'Primero crea un merchant para obtener la API key.'); return; }

    const amount   = parseFloat(document.getElementById('p-amount').value);
    const currency = document.getElementById('p-currency').value;
    const desc     = document.getElementById('p-desc').value.trim() || undefined;
    const cEmail   = document.getElementById('p-email').value.trim() || undefined;

    if (!amount || amount <= 0) { showAlert('payment-alert', 'Introduce un importe válido mayor que cero.'); return; }

    const body = { amount, currency };
    if (desc)   body.description = desc;
    if (cEmail) body.customer_email = cEmail;

    try {
      const r = await fetch(`${API}/payments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': currentApiKey },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (!r.ok) { showAlert('payment-alert', d.detail || 'Error al crear pago.'); return; }

      showAlert('payment-alert', `Pago de ${d.amount} ${d.currency} creado (${d.id.slice(0,8)}…).`, 'success');
      document.getElementById('p-amount').value = '';
      document.getElementById('p-desc').value   = '';
      document.getElementById('p-email').value  = '';
      await loadPayments();
    } catch {
      showAlert('payment-alert', 'No se pudo conectar con la API.');
    }
  }

  // ── Load Payments ───────────────────────────────────────────────────────────
  async function loadPayments() {
    const container = document.getElementById('payments-container');
    if (!currentApiKey) {
      container.innerHTML = '<p class="empty">Crea un merchant primero para ver sus pagos.</p>';
      return;
    }
    try {
      const r = await fetch(`${API}/payments`, { headers: { 'X-API-Key': currentApiKey } });
      const payments = await r.json();
      if (!payments.length) {
        container.innerHTML = '<p class="empty">Este merchant aún no tiene pagos.</p>';
        return;
      }
      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Importe</th><th>Estado</th>
              <th>Descripción</th><th>Cliente</th><th>Fecha</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            ${payments.map(p => `
              <tr id="row-${p.id}">
                <td style="font-family:monospace;font-size:0.75rem;">${p.id.slice(0,8)}…</td>
                <td><strong>${p.amount.toFixed(2)} ${p.currency}</strong></td>
                <td>${statusTag(p.status)}</td>
                <td>${p.description || '—'}</td>
                <td>${p.customer_email || '—'}</td>
                <td style="color:var(--text-muted);font-size:0.78rem;">${new Date(p.created_at).toLocaleString('es')}</td>
                <td><div class="actions">${actionButtons(p)}</div></td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch {
      container.innerHTML = '<p class="empty">Error al cargar pagos. ¿Está la API activa?</p>';
    }
  }

  // ── Change Status ───────────────────────────────────────────────────────────
  async function changeStatus(paymentId, newStatus) {
    try {
      const r = await fetch(`${API}/payments/${paymentId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': currentApiKey },
        body: JSON.stringify({ status: newStatus }),
      });
      const d = await r.json();
      if (!r.ok) { alert(`Error: ${d.detail}`); return; }
      await loadPayments();
    } catch {
      alert('No se pudo actualizar el estado del pago.');
    }
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  checkHealth();
  setInterval(checkHealth, 30_000);
</script>
</body>
</html>
